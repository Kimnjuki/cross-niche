# ══════════════════════════════════════════════════════════════════════════
# BLOCK 1 — www → non-www redirect (via HTTPS so Google indexes the canonical)
# Force rebuild 2026-05-14: simplified to always redirect to HTTPS non-www
# ══════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name www.thegridnexus.com;
    return 301 https://thegridnexus.com$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════
# BLOCK 2 — Main server (HTTP only; Coolify reverse proxy terminates SSL)
# ══════════════════════════════════════════════════════════════════════════
server {
    listen 80 default_server;
    server_name thegridnexus.com _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Open-file cache ──────────────────────────────────────────────────
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;

    # ── Gzip compression (fixes "Uncompressed pages" warning) ────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        image/svg+xml image/webp image/avif font/woff font/woff2;

    # ── Preconnect for critical third-party origins ─────────────────────
    # Reduces connection latency for Convex (real-time DB), GA4, and images
    add_header Link "<https://thegridnexus.com>; rel=preconnect; as=document";
    add_header Link "<https://images.unsplash.com>; rel=preconnect; crossorigin";

    # ── Security headers ─────────────────────────────────────────────────
    # HSTS – fixes "No HSTS support" notice (max-age=1yr, preload ready)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── WWW redirect (HTTPS → non-www) ────────────────────────────────────
    if ($host ~* ^www\.) {
        return 301 https://thegridnexus.com$request_uri;
    }

    # ══════════════════════════════════════════════════════════════════════
    # LEGACY ALIAS 301 REDIRECTS (relative targets — no redirect chains)
    # All targets are relative paths, so nginx never chains through another
    # server block. Fixes "Redirect chains and loops" errors.
    # ══════════════════════════════════════════════════════════════════════

    # Alias routes → canonical slugs
    rewrite ^/articles/?$        /blog permanent;
    rewrite ^/live/?$            /live-updates permanent;
    rewrite ^/ai/?$              /ai-pulse permanent;
    rewrite ^/security-tools/?$  /tools/security-scanner permanent;
    rewrite ^/blog-series/?$     /blog permanent;

    # Duplicate-render aliases (same component, different path)
    rewrite ^/billing/?$            /subscription/management permanent;
    rewrite ^/settings/?$           /subscription/management permanent;
    rewrite ^/nexus/nexusguard/?$   /tools/nexusguard permanent;
    rewrite ^/nexus/nexuspath/?$    /learn/nexus-path permanent;
    rewrite ^/nexus/nexuspulse/?$   /pulse/nexus-pulse permanent;

    # SEO-friendly alias redirect
    rewrite ^/how-to-enable-2fa-on-all-gaming-accounts-2026/?$ /article/2fa-setup-every-gaming-platform permanent;

    # WordPress scanner bait → homepage
    rewrite ^/wp-admin(.*)$    / permanent;
    rewrite ^/wp-content(.*)$  / permanent;
    rewrite ^/wp-includes(.*)$ / permanent;
    rewrite ^/xmlrpc\.php$     / permanent;
    rewrite ^/wp-login\.php$   / permanent;

    # Old feed URLs
    rewrite ^/feed/?$  / permanent;
    rewrite ^/rss/?$   / permanent;
    rewrite ^/atom/?$  / permanent;

    # ══════════════════════════════════════════════════════════════════════
    # AI API PROXY — route NVIDIA/Anthropic through server to avoid
    # browser DNS resolution failures and CORS policy blocks.
    # API keys injected via envsubst in Dockerfile at container startup.
    # ══════════════════════════════════════════════════════════════════════

    location /api/ai/chat {
        proxy_pass https://integrate.api.nvidia.com/v1/chat/completions;
        proxy_set_header Host integrate.api.nvidia.com;
        proxy_set_header Authorization "Bearer ${NVIDIA_API_KEY}";
        proxy_set_header Content-Type application/json;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/anthropic/chat {
        proxy_pass https://api.anthropic.com/v1/messages;
        proxy_set_header Host api.anthropic.com;
        proxy_set_header x-api-key "${ANTHROPIC_API_KEY}";
        proxy_set_header anthropic-version "2023-06-01";
        proxy_set_header Content-Type application/json;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ══════════════════════════════════════════════════════════════════════
    # SEO / CONFIG FILES
    # ══════════════════════════════════════════════════════════════════════

    location = /robots.txt {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    location = /ads.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # ══════════════════════════════════════════════════════════════════════
    # 404-CAUSING PATTERNS — common broken URL patterns that users hit
    # Redirect these to the most relevant section
    # ══════════════════════════════════════════════════════════════════════

    # Common misspellings and old paths
    rewrite ^/gamming/?$       /gaming redirect;
    rewrite ^/secuirty/?$      /security redirect;
    rewrite ^/teck/?$          /tech redirect;
    rewrite ^/securty/?$       /security redirect;
    rewrite ^/cyber/?$         /security redirect;
    rewrite ^/cybersecurity/?$ /security redirect;

    # Old article paths (before slug-based routing)
    rewrite ^/p/?(.*)$        /article/$1 redirect;
    rewrite ^/post/?(.*)$     /article/$1 redirect;
    # Old /tech/{slug} path — redirect to canonical /article/slug
    rewrite ^/tech/(.+)$       https://thegridnexus.com/article/$1 permanent;
    # Old /security/{slug} path — redirect to canonical /article/slug
    rewrite ^/security/(.+)$   https://thegridnexus.com/article/$1 permanent;
    # Old /gaming/{slug} path — redirect to canonical /article/slug
    rewrite ^/gaming/(.+)$     https://thegridnexus.com/article/$1 permanent;
    rewrite ^/2026/?(.*)$     https://thegridnexus.com/article/$1 redirect;

    # Dead article slugs (from old sitemap data) — return 410 Gone so Google de-indexes
    # These slugs came from old generated articles that no longer exist in mockData.ts
    set $dead_slug 0;
    if ($uri ~* ^/article/(sec-1|ai-basics|game-1|tech-1|asus-supplier-firmware-breach-hardware-backdoor|6g-networks-prototype-trials-2024|threat-intelligence-proactive-defense-stix-taxii-2026)$) {
        set $dead_slug 1;
    }
    if ($dead_slug = 1) {
        return 410;
    }
    # SPA handles /news/ — router resolves it
    rewrite ^/news$          /news/ redirect;

    # Sitemap index
    location = /sitemap-index.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri =404;
    }

    # Main sitemap
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri =404;
    }

    # Article sitemap
    location = /sitemap-articles.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri =404;
    }

    # Google News sitemap
    location = /sitemap-news.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=1800";
        access_log off;
        try_files $uri =404;
    }

    # LLMs.txt for AI crawlers (ChatGPT, Claude, Perplexity, Gemini, etc.)
    location = /llms.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Favicons & manifest
    location ~* ^/(favicon\.ico|favicon\.svg|apple-touch-icon\.png|site\.webmanifest|browserconfig\.xml)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ══════════════════════════════════════════════════════════════════════
    # STATIC ASSETS — long cache (immutable, content-hashed filenames)
    # Fixes "Uncached JS/CSS" warnings
    # ══════════════════════════════════════════════════════════════════════
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ══════════════════════════════════════════════════════════════════════
    # HTML / SPA ROUTING
    # ══════════════════════════════════════════════════════════════════════

    location = /index.html {
        add_header Cache-Control "public, max-age=300";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # ── Trailing slash → no trailing slash (canonical URL normalization) ──
    # Prevents /article/foo vs /article/foo/ being treated as duplicates
    # Root path (/) and index.html are excluded from the rewrite
    rewrite ^/(.+)/$ /$1 permanent;

    # HTML pages: short public cache so returning visitors get fresh content
    # but repeated visits within 60s avoid a full revalidation round-trip
        # Serve 404.html for unknown routes (instead of 200)
    error_page 404 /404.html;

    location / {
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # Serve prerendered static HTML for SEO; fall back to SPA for interactivity
        try_files $uri $uri/ /index.html;
    }

    # ══════════════════════════════════════════════════════════════════════
    # UTILITY
    # ══════════════════════════════════════════════════════════════════════

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    location = /readyz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ready\n";
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
