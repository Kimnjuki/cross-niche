# ══════════════════════════════════════════════════════════════════════════
# BLOCK 1 — HTTP → HTTPS redirect (fixes "Neither canonical URL nor 301
# redirect from HTTP homepage" + non-secure pages errors)
# ══════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name thegridnexus.com www.thegridnexus.com;
    return 301 https://thegridnexus.com$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════
# BLOCK 2 — www → non-www redirect on HTTPS (fixes "www resolve issues")
# ══════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name www.thegridnexus.com;

    ssl_certificate     /etc/ssl/certs/thegridnexus.crt;
    ssl_certificate_key /etc/ssl/private/thegridnexus.key;

    return 301 https://thegridnexus.com$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════
# BLOCK 3 — Canonical HTTPS server
# ══════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen 80 default_server;   # fallback if SSL terminates at load-balancer
    server_name thegridnexus.com _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SSL (only needed when nginx terminates TLS directly) ─────────────
    ssl_certificate     /etc/ssl/certs/thegridnexus.crt;
    ssl_certificate_key /etc/ssl/private/thegridnexus.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Open-file cache ──────────────────────────────────────────────────
    open_file_cache max=1000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;

    # ── Gzip compression (fixes "Uncompressed pages" warning) ────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml application/atom+xml
        image/svg+xml font/woff font/woff2;

    # ── Security headers ─────────────────────────────────────────────────
    # HSTS – fixes "No HSTS support" notice (max-age=1yr, preload ready)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ══════════════════════════════════════════════════════════════════════
    # CANONICAL: trailing-slash → no-slash 301 (except /)
    # Fixes "non-canonical page in sitemap" / duplicate content
    # ══════════════════════════════════════════════════════════════════════
    if ($request_uri ~ ^(/[^?]*)/$) {
        return 301 $scheme://thegridnexus.com$1$is_args$args;
    }

    # ══════════════════════════════════════════════════════════════════════
    # LEGACY ALIAS 301 REDIRECTS (relative targets — no redirect chains)
    # All targets are relative paths, so nginx never chains through another
    # server block. Fixes "Redirect chains and loops" errors.
    # ══════════════════════════════════════════════════════════════════════

    # Alias routes → canonical slugs
    rewrite ^/articles/?$        /blog permanent;
    rewrite ^/live/?$            /live-updates permanent;
    rewrite ^/ai/?$              /ai-pulse permanent;
    rewrite ^/security-tools/?$  /tools/security-scanner permanent;
    rewrite ^/blog-series/?$     /blog permanent;

    # Duplicate-render aliases (same component, different path)
    rewrite ^/billing/?$            /subscription/management permanent;
    rewrite ^/settings/?$           /subscription/management permanent;
    rewrite ^/nexus/nexusguard/?$   /tools/nexusguard permanent;
    rewrite ^/nexus/nexuspath/?$    /learn/nexus-path permanent;
    rewrite ^/nexus/nexuspulse/?$   /pulse/nexus-pulse permanent;

    # WordPress scanner bait → homepage
    rewrite ^/wp-admin(.*)$    / permanent;
    rewrite ^/wp-content(.*)$  / permanent;
    rewrite ^/wp-includes(.*)$ / permanent;
    rewrite ^/xmlrpc\.php$     / permanent;
    rewrite ^/wp-login\.php$   / permanent;

    # Old feed URLs
    rewrite ^/feed/?$  / permanent;
    rewrite ^/rss/?$   / permanent;
    rewrite ^/atom/?$  / permanent;

    # ══════════════════════════════════════════════════════════════════════
    # SEO / CONFIG FILES
    # ══════════════════════════════════════════════════════════════════════

    location = /robots.txt {
        default_type text/plain;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    location = /ads.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Sitemap index
    location = /sitemap-index.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header X-Robots-Tag "noindex";
        access_log off;
        try_files $uri =404;
    }

    # Main sitemap
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header X-Robots-Tag "noindex";
        access_log off;
        try_files $uri =404;
    }

    # Article sitemap
    location = /sitemap-articles.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        add_header X-Robots-Tag "noindex";
        access_log off;
        try_files $uri =404;
    }

    # Google News sitemap
    location = /sitemap-news.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=1800";
        add_header X-Robots-Tag "noindex";
        access_log off;
        try_files $uri =404;
    }

    # LLMs.txt for AI crawlers (ChatGPT, Claude, Perplexity, Gemini, etc.)
    location = /llms.txt {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
        log_not_found off;
        try_files $uri =404;
    }

    # Favicons & manifest
    location ~* ^/(favicon\.ico|favicon\.svg|apple-touch-icon\.png|site\.webmanifest|browserconfig\.xml)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ══════════════════════════════════════════════════════════════════════
    # STATIC ASSETS — long cache (immutable, content-hashed filenames)
    # Fixes "Uncached JS/CSS" warnings
    # ══════════════════════════════════════════════════════════════════════
    location ~* \.(jpg|jpeg|png|gif|ico|webp|avif|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ══════════════════════════════════════════════════════════════════════
    # HTML / SPA ROUTING
    # ══════════════════════════════════════════════════════════════════════

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # ══════════════════════════════════════════════════════════════════════
    # UTILITY
    # ══════════════════════════════════════════════════════════════════════

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
